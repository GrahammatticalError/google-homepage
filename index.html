<!DOCTYPE html>
<html>
  <head>
    <title>Google</title>
    <link rel="icon" href="images/google_icon-icons.com_62736.ico" />
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="navbar">
      <ul class="leftside">
        <a href="#" class="leftside">About</a>
        <a href="#" class="leftside">Store</a>
      </ul>
      <ul class="top-right">
        <a href="#" class="rightside">Images</a>
        <a href="#" class="rightside">Gmail</a>
      </ul>
      <div class="dropdown">
        <a href="#"
          ><img
            height="40px"
            width="40px"
            src="images/1492790848-70menu_84220.png"

        /></a>

      <div class="sign-in">
        <button class="sign-in-button">Sign in</button>
      </div>

      <img src="images/googlelogo_color_272x92dp.png" alt="Google logo" />

      <input

        name="searchbar"

    <p>

      <a href="#" style="color: #1a0dab">Google Store</a>
    </p>

    <div class="footer">
      <ul>
        <a href="#" class="bottom-left">Advertising</a>
        <a href="#" class="bottom-left">Business</a>
        <a href="#" class="bottom-left">How Search works</a>
        <a href="#" class="bottom-right">Settings</a>
        <a href="#" class="bottom-right">Terms</a>
        <a href="#" class="bottom-right">Privacy</a>
